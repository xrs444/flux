# yamllint disable rule:line-length
---
# Core cluster utilities: HelmRepositories, kube-system jobs, metrics, spegel, storage PVCs
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-core
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/core
  wait: true
  timeout: 5m0s
  prune: true
---
