# Radarr - Movie collection manager and auto-importer
# Watches /ingest, renames/organizes to /movies (Jellyfin library)
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: radarr
resources:
  - namespace.yaml
  - deployment-radarr.yaml
  - service-radarr.yaml
  # Metrics ClusterIP service + ServiceMonitor for Exportarr sidecar (port 9708)
  - service-radarr-metrics.yaml
  - servicemonitor-radarr.yaml
  - ingressroute-radarr.yaml
  # Storage resources
  - pv-radarr-movies.yaml
  - pv-radarr-ingest.yaml
  - pvc-radarr-config.yaml
  - pvc-radarr-movies.yaml
  - pvc-radarr-ingest.yaml
