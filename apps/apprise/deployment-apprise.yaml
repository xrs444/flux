---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  namespace: apprise
  labels:
    app: apprise
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: apprise
  template:
    metadata:
      labels:
        app: apprise
    spec:
      initContainers:
        # Render ${NTFY_APPRISE_PASSWORD} in the config template into a writable
        # emptyDir volume. Apprise API does not support env var substitution
        # natively (https://github.com/caronc/apprise/issues/1156), so envsubst
        # is used here. The rendered /config dir is also writable, which fixes
        # CONFIG_PERMISSION_ISSUE in the Apprise health status.
        - name: render-config
          image: alpine:3.24
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst < /config-template/apprise.yml > /config/apprise.yml
          env:
            - name: NTFY_APPRISE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apprise-ntfy-credentials
                  key: password
          volumeMounts:
            - name: apprise-config-template
              mountPath: /config-template
              readOnly: true
            - name: apprise-config-rendered
              mountPath: /config
      containers:
        - name: apprise
          image: caronc/apprise:latest
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: apprise-config-rendered
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 1024Mi
      volumes:
        - name: apprise-config-template
          configMap:
            name: apprise-config
        - name: apprise-config-rendered
          emptyDir: {}
