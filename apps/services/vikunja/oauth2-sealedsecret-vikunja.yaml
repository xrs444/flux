# SealedSecret for Vikunja — Kanidm OAuth2 credentials + JWT + DB password.
#
# Populate before deploying:
#   1. On xsvr1 after the provision.nix change adds oauth2_vikunja, read:
#        /run/secrets/kanidm_oauth2_vikunja_secret
#   2. Generate:
#        JWT_SECRET=$(openssl rand -hex 32)
#        DB_PASSWORD=$(openssl rand -hex 24)
#   3. Seal:
#        kubectl create secret generic oauth2-secret-vikunja \
#          --namespace vikunja \
#          --from-literal=client-id=oauth2_vikunja \
#          --from-literal=client-secret="<kanidm oauth2 secret>" \
#          --from-literal=jwt-secret="$JWT_SECRET" \
#          --from-literal=db-password="$DB_PASSWORD" \
#          --dry-run=client -o yaml | \
#        kubeseal --controller-name=sealed-secrets \
#                 --controller-namespace=sealed-secrets \
#                 --format=yaml > oauth2-sealedsecret-vikunja.yaml
#
# Rotating any value: regenerate, reseal, `flux reconcile` — Vikunja pod
# picks up the new value on next restart.
# yamllint disable rule:line-length
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-secret-vikunja
  namespace: vikunja
spec:
  encryptedData:
    # PLACEHOLDERS — will be replaced by kubeseal output on real provisioning.
    client-id: PLACEHOLDER_VIKUNJA_CLIENT_ID_REPLACE_WITH_KUBESEAL_OUTPUT
    client-secret: PLACEHOLDER_VIKUNJA_CLIENT_SECRET_REPLACE_WITH_KUBESEAL_OUTPUT
    jwt-secret: PLACEHOLDER_VIKUNJA_JWT_SECRET_REPLACE_WITH_KUBESEAL_OUTPUT
    db-password: PLACEHOLDER_VIKUNJA_DB_PASSWORD_REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: oauth2-secret-vikunja
      namespace: vikunja
    type: Opaque
