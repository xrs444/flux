# yamllint disable rule:line-length
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
  namespace: netbox
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: netbox
      version: '8.3.33'
      sourceRef:
        kind: HelmRepository
        name: netbox
        namespace: netbox
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      registry: ghcr.io
      repository: xrs444/netbox-custom
      tag: v4.6.1

    replicaCount: 1

    # Plugins — installed in the custom image
    plugins:
      - netbox_prometheus_sd
    pluginsConfig:
      netbox_prometheus_sd: {}

    # Enable Prometheus metrics with ServiceMonitor for in-cluster scraping
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s

    # Superuser configuration
    superuser:
      name: admin
      email: admin@xrs444.net
      existingSecret: netbox-superuser

    # Django secret key
    existingSecret: netbox-secret

    # Network configuration
    allowedHosts:
      - netbox.xrs444.net
      - "*"
    csrfTrustedOrigins:
      - https://netbox.xrs444.net

    # PostgreSQL configuration
    postgresql:
      enabled: true
      auth:
        username: netbox
        database: netbox
        existingSecret: netbox-secret
        secretKeys:
          adminPasswordKey: db_password
          userPasswordKey: db_password
      primary:
        persistence:
          enabled: true
          size: 10Gi

    # Valkey (Redis-compatible) configuration
    valkey:
      enabled: true
      auth:
        enabled: true
        existingSecret: netbox-secret
        existingSecretPasswordKey: redis_password

    # Persistence for media files (RWX — shared by netbox and worker pods)
    persistence:
      enabled: true
      size: 5Gi
      accessMode: ReadWriteMany

    # Probes — Granian listens on port 8080
    livenessProbe:
      enabled: false
    customLivenessProbe:
      httpGet:
        path: /login/
        port: http
        httpHeaders:
          - name: Host
            value: netbox.xrs444.net
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    readinessProbe:
      enabled: true
      timeoutSeconds: 5
    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      timeoutSeconds: 5

    # Disable built-in ingress (using Traefik IngressRoute)
    ingress:
      enabled: false

    # OIDC Authentication with Kanidm
    remoteAuth:
      enabled: true
      backends:
        - social_core.backends.open_id_connect.OpenIdConnectAuth
      autoCreateUser: true
      superusers:
        - xrs444

    # OIDC endpoint and secrets injected as Django settings
    extraConfig:
      - values:
          SOCIAL_AUTH_OIDC_OIDC_ENDPOINT: "https://idm.xrs444.net/oauth2/openid/oauth2_netbox"
      - secret:
          secretName: netbox-oidc-config
          items:
            - key: oidc.yaml
              path: oidc.yaml
      - secret:
          secretName: netbox-api-token-peppers
          items:
            - key: api-token-peppers.yaml
              path: api-token-peppers.yaml
