---
# Traefik ServersTransport for warpgate HTTPS backend.
# Warpgate serves HTTPS on its HTTP port; Traefik connects via HTTPS and
# skips cert verification (the wildcard cert's SAN is the external hostname,
# not the internal Kubernetes service name).
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: warpgate-https
  namespace: warpgate
spec:
  insecureSkipVerify: true
