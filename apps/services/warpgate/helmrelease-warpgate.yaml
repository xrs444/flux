---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: warpgate
  namespace: warpgate
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: warpgate
      version: ">=0.0.2 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: warpgate
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Patch the Deployment to use Recreate strategy so upgrades don't deadlock
  # when the old pod holds the RWO PVC on a different node.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: warpgate
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
              - op: add
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                    - weight: 80
                      preference:
                        matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                          - v-k8s-xsvr3
  values:
    image:
      repository: ghcr.io/warp-tech/warpgate
      tag: "0.25.5"
      pullPolicy: IfNotPresent

    replicaCount: 1

    # Persistence configuration
    data:
      pvc:
        enabled: true
        claimName: warpgate-data

    # Use podinit mode so setup runs as an init container instead of a
    # separate Job. The Job mode creates an immutable resource that Helm
    # cannot patch on upgrade, permanently stalling the HelmRelease.
    setup:
      enabled: true
      type: podinit
      recordSessions: true
      # containerPort for the http port comes from setup.http, not
      # service.ports.http -- both must be kept in sync (see 443 note below).
      http: 443

    # Service configuration (web UI - ClusterIP for Traefik)
    service:
      type: ClusterIP
      ports:
        http: 443
        ssh: 2222
        mysql: 33306
        postgresql: 55432

    # Disable default ingress (using Traefik IngressRoute)
    ingress:
      enabled: false

    # Mount the wildcard TLS cert so warpgate can serve HTTPS.
    # subPath mounts appear alongside the PVC data at /data.
    volumes:
      - name: tls-cert
        secret:
          secretName: letsencrypt-wildcard-cert-xrs444.net

    volume_mounts:
      - name: tls-cert
        mountPath: /data/tls.certificate.pem
        subPath: tls.crt
        readOnly: true
      - name: tls-cert
        mountPath: /data/tls.key.pem
        subPath: tls.key
        readOnly: true

    # Warpgate configuration via overrides_config
    overrides_config: |
      external_host: warpgate.xrs444.net

      http:
        enable: true
        listen: "0.0.0.0:443"
        trust_x_forwarded_headers: true
        certificate: /data/tls.certificate.pem
        key: /data/tls.key.pem

      ssh:
        enable: true
        listen: "0.0.0.0:2222"

      mysql:
        enable: true
        listen: "0.0.0.0:33306"
        certificate: /data/tls.certificate.pem
        key: /data/tls.key.pem

      database_url: "sqlite:/data/db"

      recordings:
        path: /data/recordings

      sso_providers:
        - name: kanidm
          label: Kanidm
          provider:
            type: custom
            client_id: oauth2_warpgate
            client_secret: ${WARPGATE_OIDC_SECRET}
            issuer_url: https://idm.xrs444.net/oauth2/openid/oauth2_warpgate
            scopes: ["openid", "email"]

    # Environment variables for secret injection
    env:
      - name: WARPGATE_OIDC_SECRET
        valueFrom:
          secretKeyRef:
            name: warpgate-oidc
            key: client-secret

    # Security context
    podSecurityContext:
      fsGroup: 1000

    # Warpgate derives its own SSO redirect_uri from whatever port it's
    # actually listening on (upstream bug, warp-tech/warpgate#1252 -- it
    # ignores external_host for this). Listening on 443 directly makes it
    # emit a port-less redirect_uri that resolves through Traefik's existing
    # websecure entrypoint, instead of an unreachable :8888. NET_BIND_SERVICE
    # lets the non-root container bind that privileged port.
    securityContext:
      capabilities:
        add:
          - NET_BIND_SERVICE

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
