---
# yamllint disable rule:line-length
apiVersion: v1
kind: ConfigMap
metadata:
  name: seatable-config
  namespace: seatable
data:
  oauth-settings.py: |
    # OAuth/OIDC Configuration for Kanidm
    IS_PRO_VERSION = True
    ENABLE_OAUTH = True
    OAUTH_CLIENT_ID = 'oauth2_seatable'
    OAUTH_REDIRECT_URL = 'https://seatable.xrs444.net/oauth/callback/'
    OAUTH_AUTHORIZATION_URL = 'https://idm.xrs444.net/ui/oauth2'
    OAUTH_TOKEN_URL = 'https://idm.xrs444.net/oauth2/token'
    OAUTH_USER_INFO_URL = 'https://idm.xrs444.net/oauth2/openid/oauth2_seatable/userinfo'
    OAUTH_SCOPE = ['openid', 'profile', 'email']
    OAUTH_ATTRIBUTE_MAP = {
        'sub': 'uid',
        'name': 'name',
        'email': 'email',
    }
    OAUTH_PROVIDER_DOMAIN = 'idm.xrs444.net'

  url-settings.py: |
    # SeaTable URL Configuration
    # Required for proper routing of dtable-server and seafile requests
    DTABLE_SERVER_URL = 'https://seatable.xrs444.net/dtable-server/'
    DTABLE_SOCKET_URL = 'https://seatable.xrs444.net/'
    DTABLE_WEB_SERVICE_URL = 'https://seatable.xrs444.net/'
    FILE_SERVER_ROOT = 'https://seatable.xrs444.net/seafhttp/'
