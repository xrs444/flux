---
# Garage admin port (3903) — Prometheus metrics endpoint
apiVersion: v1
kind: Service
metadata:
  name: garage-metrics
  namespace: garage
  labels:
    app: garage
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 3903
      targetPort: 3903
      protocol: TCP
  selector:
    app: garage
