# SealedSecret for Radicale htpasswd — one bcrypt line per family member.
#
# Generate:
#   htpasswd -B -c users xrs444          # create with xrs444's password
#   htpasswd -B users samantha           # add samantha
#   htpasswd -B users rowan              # add each kid
#   htpasswd -B users greyson
#
# Then seal the file into a k8s Secret:
#   kubectl create secret generic radicale-users \
#     --namespace radicale \
#     --from-file=users=./users \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-name=sealed-secrets \
#            --controller-namespace=sealed-secrets \
#            --format=yaml \
#            > sealedsecret-radicale-users.yaml
#
# Deployment mounts this at /etc/radicale/users (read-only). Rotating a
# password = regenerate the users file, reseal, commit, push, Flux applies,
# clients re-auth on next sync.
# yamllint disable rule:line-length
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: radicale-users
  namespace: radicale
spec:
  encryptedData:
    users: 
  template:
    metadata:
      name: radicale-users
      namespace: radicale
    type: Opaque
