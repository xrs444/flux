# yamllint disable rule:line-length
# This Secret contains the full Prometheus scrape configuration for all targets.
# The content is the YAML value of the 'scrape-configs.yaml' key.
#
# Seal with:
#   kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets --format yaml \
#     < <(kubectl create secret generic prometheus-additional-scrape-configs -n monitoring \
#         --from-file=scrape-configs.yaml=./scrape-configs.yaml \
#         --dry-run=client -o yaml) \
#     > sealedsecret-additional-scrape-configs.yaml
#
# Where scrape-configs.yaml contains the content from scrape-configs.yaml.example in this directory.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: prometheus-additional-scrape-configs
  namespace: monitoring
spec:
  encryptedData:
    scrape-configs.yaml: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: prometheus-additional-scrape-configs
      namespace: monitoring
