# yamllint disable rule:line-length
# Source value from xsvr1: sudo cat /run/secrets/snmp-community
# Seal with:
#   kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets --format yaml \
#     < <(kubectl create secret generic snmp-community -n monitoring \
#         --from-literal=community=<VALUE_FROM_XSVR1> \
#         --dry-run=client -o yaml) \
#     > sealedsecret-snmp-community.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: snmp-community
  namespace: monitoring
spec:
  encryptedData:
    community: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: snmp-community
      namespace: monitoring
