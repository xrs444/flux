# yamllint disable rule:line-length
# Source value from xsvr1: sudo cat /run/secrets/homeassistant-token
# Seal with:
#   kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets --format yaml \
#     < <(kubectl create secret generic ha-bearer-token -n monitoring \
#         --from-literal=token=<VALUE_FROM_XSVR1> \
#         --dry-run=client -o yaml) \
#     > sealedsecret-ha-bearer-token.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ha-bearer-token
  namespace: monitoring
spec:
  encryptedData:
    token: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: ha-bearer-token
      namespace: monitoring
