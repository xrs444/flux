# yamllint disable rule:line-length
# Source value from xsvr1: sudo cat /run/secrets/netbox-token
# This token is used by Prometheus to authenticate to the NetBox HTTP SD endpoints.
# Create a read-only NetBox API token for the prometheus-sd user.
# Seal with:
#   kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets --format yaml \
#     < <(kubectl create secret generic netbox-api-token -n monitoring \
#         --from-literal=token=<NETBOX_API_TOKEN> \
#         --dry-run=client -o yaml) \
#     > sealedsecret-netbox-api-token.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: netbox-api-token
  namespace: monitoring
spec:
  encryptedData:
    token: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: netbox-api-token
      namespace: monitoring
