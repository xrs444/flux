# yamllint disable rule:line-length
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '86.2.2'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    # Disable bundled exporters — these are already deployed separately or not needed
    nodeExporter:
      enabled: false
    kubeStateMetrics:
      enabled: false

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        retention: 30d
        retentionSize: 45GiB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-retain
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 50Gi
        # Additional scrape configs from Secret (bare-metal hosts, SNMP, k8s NodePorts, HA, etc.)
        additionalScrapeConfigsSecret:
          enabled: true
          name: prometheus-additional-scrape-configs
          key: scrape-configs.yaml
        # Secrets mounted at /etc/prometheus/secrets/<name>/ for credentials_file use
        secrets:
          - ha-bearer-token
          - netbox-api-token
        # Allow ServiceMonitors/PodMonitors/PrometheusRules from any namespace
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
      ingress:
        enabled: false

    # Grafana configuration
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: longhorn-retain
        size: 5Gi
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      # The chart's sidecar already provisions a default Prometheus datasource.
      # Only add Loki here to avoid a duplicate-default conflict.
      additionalDataSources:
        - name: Loki
          type: loki
          url: https://loki.xrs444.net
          uid: "000000002"
          jsonData:
            maxLines: 1000
            timeout: 60
      # Sidecar loads ConfigMaps labelled grafana_dashboard=1 from all namespaces
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          folderAnnotation: grafana_folder
          provider:
            disableDelete: false
            allowUiUpdates: true
      ingress:
        enabled: false

    # Alertmanager configuration
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-retain
              resources:
                requests:
                  storage: 2Gi
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: apprise
          group_by: [alertname, instance]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - matchers:
                - severity=critical
              receiver: apprise
              repeat_interval: 1h
        receivers:
          - name: apprise
            webhook_configs:
              - url: https://apprise.xrs444.net/notify/apprise
                send_resolved: true
                http_config:
                  tls_config:
                    insecure_skip_verify: false
          # Windmill remediation receiver — fires alert-triggered runbooks.
          # The webhook token is generated in Windmill UI for f/alerts/remediate.
          # Replace WINDMILL_WEBHOOK_TOKEN with the actual token after first deploy.
          - name: windmill-remediate
            webhook_configs:
              - url: https://windmill.xrs444.net/api/w/homeprod/jobs_u/run/p/f/alerts/remediate?token=WINDMILL_WEBHOOK_TOKEN
                send_resolved: true
                http_config:
                  tls_config:
                    insecure_skip_verify: false
        routes:
          - matchers:
              - severity=critical
            receiver: apprise
            repeat_interval: 1h
          # Route alerts labelled remediate=true to Windmill (and also to Apprise via continue)
          - matchers:
              - remediate="true"
            receiver: windmill-remediate
            continue: true
      ingress:
        enabled: false

    # Windmill-specific alert rules
    additionalPrometheusRulesMap:
      windmill-rules:
        groups:
          - name: windmill
            rules:
              - alert: WindmillWorkerDown
                expr: up{job="windmill"} == 0
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "Windmill unreachable"
                  description: "Prometheus cannot scrape windmill metrics endpoint for 5 minutes."
