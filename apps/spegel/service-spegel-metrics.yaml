---
# Spegel registry mirror exposes Prometheus metrics on port 9090
apiVersion: v1
kind: Service
metadata:
  name: spegel-metrics
  namespace: spegel
  labels:
    app.kubernetes.io/name: spegel
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: spegel
