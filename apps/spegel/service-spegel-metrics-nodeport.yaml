---
apiVersion: v1
kind: Service
metadata:
  name: spegel-metrics-nodeport
  namespace: spegel
  labels:
    app.kubernetes.io/name: spegel
    app.kubernetes.io/component: metrics
spec:
  type: NodePort
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      nodePort: 30105
      protocol: TCP
  selector:
    app.kubernetes.io/name: spegel
