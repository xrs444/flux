---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: warpgate
  namespace: warpgate
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: warpgate
      version: "0.0.2"
      sourceRef:
        kind: HelmRepository
        name: warpgate
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/warp-tech/warpgate
      tag: "0.22.0-beta.5"
      pullPolicy: IfNotPresent

    replicaCount: 1

    # Persistence configuration
    data:
      pvc:
        enabled: true
        claimName: warpgate-data

    # Setup job configuration
    # Note: Chart expects 'warpgate-secret' with 'adminPassword' key
    setup:
      enabled: true
      recordSessions: true

    # Service configuration (web UI - ClusterIP for Traefik)
    service:
      type: ClusterIP
      ports:
        http: 8888
        ssh: 2222
        mysql: 33306
        postgresql: 55432

    # Disable default ingress (using Traefik IngressRoute)
    ingress:
      enabled: false

    # Warpgate configuration via overrides_config
    overrides_config: |
      external_host: warpgate.xrs444.net

      http:
        enable: true
        listen: "0.0.0.0:8888"
        trust_x_forwarded_headers: true

      ssh:
        enable: true
        listen: "0.0.0.0:2222"

      mysql:
        enable: true
        listen: "0.0.0.0:33306"

      database_url: "sqlite:/data/db"

      recordings:
        path: /data/recordings

      sso_providers:
        - name: kanidm
          label: Kanidm
          provider:
            type: custom
            client_id: oauth2_warpgate
            client_secret: ${WARPGATE_OIDC_SECRET}
            issuer_url: https://idm.xrs444.net/oauth2/openid/oauth2_warpgate
            scopes: ["openid", "email"]

    # Environment variables for secret injection
    env:
      - name: WARPGATE_OIDC_SECRET
        valueFrom:
          secretKeyRef:
            name: warpgate-oidc
            key: client-secret

    # Security context
    podSecurityContext:
      fsGroup: 1000

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
