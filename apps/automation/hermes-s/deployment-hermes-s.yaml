---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-s
  namespace: hermes-s
  labels:
    app: hermes-s
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-s
  template:
    metadata:
      labels:
        app: hermes-s
    spec:
      securityContext:
        fsGroup: 10000
      containers:
        - name: hermes-s
          image: nousresearch/hermes-agent:v2026.7.1
          command: ["sh", "-c", "hermes dashboard --host 0.0.0.0 & exec hermes gateway run"]
          ports:
            - containerPort: 8642
              name: gateway
            - containerPort: 9119
              name: dashboard
          env:
            - name: TZ
              value: "America/Phoenix"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PUBLIC_URL
              value: "https://hermes-s.xrs444.net"
            - name: HERMES_DASHBOARD_OIDC_ISSUER
              value: "https://idm.xrs444.net/oauth2/openid/oauth2_hermes_s"
            - name: HERMES_DASHBOARD_OIDC_CLIENT_ID
              value: "oauth2_hermes_s"
            - name: HINDSIGHT_MODE
              value: "local_external"
            - name: HINDSIGHT_API_URL
              value: "http://hindsight.hindsight.svc.cluster.local:8888"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-s-config
                  key: DEEPSEEK_API_KEY
            - name: HERMES_DASHBOARD_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-s-config
                  key: OIDC_CLIENT_SECRET
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-s-config
                  key: API_SERVER_KEY
          volumeMounts:
            - name: hermes-s-data
              mountPath: /opt/data
            - name: hermes-s-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          startupProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: hermes-s-data
          persistentVolumeClaim:
            claimName: hermes-s-data
        - name: hermes-s-config
          configMap:
            name: hermes-s-config
            items:
              - key: config.yaml
                path: config.yaml
