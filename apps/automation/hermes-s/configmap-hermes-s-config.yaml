---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-s-config
  namespace: hermes-s
data:
  config.yaml: |
    model:
      default: deepseek-v4-flash
      provider: deepseek

    terminal:
      backend: local

    memory:
      memory_enabled: true
      backend: hindsight
      hindsight:
        mode: local_external
        api_url: http://hindsight.hindsight.svc.cluster.local:8888
        bank_id: hermes-s

    # Only mcp-prometheus — Hermes-S is scoped to basic non-sensitive
    # metrics for triaging voice/UX regressions (see
    # flux/apps/observability/mcp-tools/kustomization.yaml). Loki logs and
    # k8s inspection stay hermes-t-only; verified /mcp path against the
    # live pod, same as hermes-t.
    mcp_servers:
      mcp-prometheus:
        url: http://mcp-prometheus.mcp-tools.svc.cluster.local:8080/mcp
        enabled: true
