# SealedSecret placeholder for hermes-k.
#
# This file needs three keys sealed into it before hermes-k will start:
#   - API_SERVER_KEY:       random 32-byte hex (openssl rand -hex 32)
#   - DEEPSEEK_API_KEY:     the household DeepSeek API key
#                           (Phase A uses DeepSeek; Phase B swaps to LiteLLM
#                            on xcog1 and this key is removed then.)
#   - OIDC_CLIENT_SECRET:   the Kanidm oauth2_hermes_k secret, taken from
#                           /run/secrets/kanidm_oauth2_hermes_k_secret on
#                           xsvr1 after `deploy-rs` applies the provision.nix
#                           change that adds oauth2_hermes_k (see
#                           nix/modules/services/kanidm/provision.nix and
#                           nix/secrets/kanidm_oauth2_secrets.yaml).
#
# Seal locally after collecting values:
#
#   kubectl create secret generic hermes-k-config \
#     --namespace hermes-k \
#     --from-literal=API_SERVER_KEY="<random>" \
#     --from-literal=DEEPSEEK_API_KEY="<household key>" \
#     --from-literal=OIDC_CLIENT_SECRET="<from xsvr1>" \
#     --dry-run=client -o yaml | \
#   kubeseal \
#     --controller-name=sealed-secrets \
#     --controller-namespace=sealed-secrets \
#     --format=yaml \
#     > sealedsecret-hermes-k-config.yaml
#
# Then commit the result — sealed value only, plaintext never leaves the
# provisioning host. Until this file has real encryptedData it must not be
# applied; hermes-k's Deployment will hang in ContainerCreating without the
# secret. That's intentional — it enforces "no deploy without the secret."
# yamllint disable rule:line-length
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hermes-k-config
  namespace: hermes-k
spec:
  encryptedData:
    # PLACEHOLDER — will be replaced by kubeseal output on real provisioning.
    # Presence of these dummy values keeps kustomize builds valid but the
    # controller will fail to unseal them, holding the Deployment in a safe
    # not-ready state until the real secret is committed.
    API_SERVER_KEY: PLACEHOLDER_API_SERVER_KEY_REPLACE_WITH_KUBESEAL_OUTPUT
    DEEPSEEK_API_KEY: PLACEHOLDER_DEEPSEEK_API_KEY_REPLACE_WITH_KUBESEAL_OUTPUT
    OIDC_CLIENT_SECRET: PLACEHOLDER_OIDC_CLIENT_SECRET_REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: hermes-k-config
      namespace: hermes-k
