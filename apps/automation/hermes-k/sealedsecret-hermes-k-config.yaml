# SealedSecret for hermes-k. Sealed against the sealed-secrets controller
# in-cluster — only that controller can decrypt encryptedData below.
# Keys: API_SERVER_KEY (random), DEEPSEEK_API_KEY (household key, shared
# with hermes-t/hermes-s; removed when Phase B swaps to LiteLLM on xcog1),
# OIDC_CLIENT_SECRET (Kanidm oauth2_hermes_k secret, matches
# nix/secrets/kanidm_oauth2_secrets.yaml).
# yamllint disable rule:line-length
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hermes-k-config
  namespace: hermes-k
spec:
  encryptedData:
    API_SERVER_KEY: 
    DEEPSEEK_API_KEY: 
    OIDC_CLIENT_SECRET: 
  template:
    metadata:
      name: hermes-k-config
      namespace: hermes-k
