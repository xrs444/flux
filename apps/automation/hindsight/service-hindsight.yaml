---
apiVersion: v1
kind: Service
metadata:
  name: hindsight
  namespace: hindsight
spec:
  selector:
    app: hindsight
  ports:
    - name: api
      protocol: TCP
      port: 8888
      targetPort: 8888
    - name: control
      protocol: TCP
      port: 9999
      targetPort: 9999
  type: ClusterIP
