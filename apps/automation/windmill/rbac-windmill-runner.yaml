---
# ServiceAccount used by default worker pods for in-cluster kubectl access.
# Scoped to the minimum permissions needed by migrated jobs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: windmill-runner
  namespace: windmill
---
# ClusterRole: permissions for jobs currently migrated to Windmill.
# Extend this as additional jobs are migrated.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: windmill-runner
rules:
  # cleanup-replicasets job: list + delete replicasets cluster-wide
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["list", "delete"]
  # General read access for diagnostic scripts
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  # Restart deployments (rollout restart = patch)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: windmill-runner
subjects:
  - kind: ServiceAccount
    name: windmill-runner
    namespace: windmill
roleRef:
  kind: ClusterRole
  name: windmill-runner
  apiGroup: rbac.authorization.k8s.io
