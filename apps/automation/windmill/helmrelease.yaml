# yamllint disable rule:line-length
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
  namespace: windmill
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: windmill
      version: "4.0.201"
      sourceRef:
        kind: HelmRepository
        name: windmill
        namespace: windmill
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Disable the demo postgresql — we deploy our own via extraDeploy
    postgresql:
      enabled: false

    # Disable built-in ingress — we use a Traefik IngressRoute
    ingress:
      enabled: false

    windmill:
      baseDomain: windmill.xrs444.net
      baseProtocol: https
      appReplicas: 1
      # windmill-extra: unified LSP + debugger pod
      extraReplicas: 1
      # Disable full-text indexer — ephemeral-storage heavy, not needed for homelab
      indexer:
        enabled: false

      # Database URL from SealedSecret
      databaseUrlSecretName: windmill-postgres-url
      databaseUrlSecretKey: url

      app:
        extraEnv:
          - name: OAUTH_JSON_AS_BASE64
            valueFrom:
              secretKeyRef:
                name: windmill-oauth
                key: oauth-json-base64

      workerGroups:
        # default: privileged, SSH-enabled, in-cluster kubectl via windmill-runner SA
        - name: default
          replicas: 1
          privileged: true
          serviceAccountName: windmill-runner
          volumes:
            - name: ssh-key
              secret:
                secretName: windmill-ssh-key
                defaultMode: 0600
            - name: known-hosts
              configMap:
                name: windmill-known-hosts
          volumeMounts:
            - name: ssh-key
              mountPath: /root/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: known-hosts
              mountPath: /root/.ssh/known_hosts
              subPath: known_hosts
              readOnly: true

        # native: lightweight, fast TS/Py jobs without container overhead
        - name: native
          replicas: 1
          privileged: false

    # Deploy postgres as part of the helm release to avoid kustomization/helm
    # service ownership conflicts. The PVC (windmill-postgres-data) is managed
    # separately by the kustomization so it survives helm uninstall.
    extraDeploy:
      - apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: windmill-postgresql
          namespace: windmill
        spec:
          serviceName: windmill-postgresql
          replicas: 1
          selector:
            matchLabels:
              app: windmill-postgresql
          template:
            metadata:
              labels:
                app: windmill-postgresql
            spec:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: kubernetes.io/hostname
                            operator: NotIn
                            values:
                              - v-k8s-xsvr3
              containers:
                - name: postgres
                  image: postgres:17
                  env:
                    - name: POSTGRES_USER
                      value: windmill
                    - name: POSTGRES_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: windmill-postgres
                          key: password
                    - name: POSTGRES_DB
                      value: windmill
                    - name: PGDATA
                      value: /var/lib/postgresql/data/pgdata
                  ports:
                    - containerPort: 5432
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/postgresql/data
                  resources:
                    requests:
                      memory: 256Mi
                      cpu: 100m
                    limits:
                      memory: 1Gi
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: windmill-postgres-data
      - apiVersion: v1
        kind: Service
        metadata:
          name: windmill-postgresql
          namespace: windmill
        spec:
          selector:
            app: windmill-postgresql
          ports:
            - port: 5432
              targetPort: 5432
