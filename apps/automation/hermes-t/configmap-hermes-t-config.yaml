---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-t-config
  namespace: hermes-t
data:
  config.yaml: |
    model:
      default: deepseek-v4-flash
      provider: deepseek

    terminal:
      backend: local

    memory:
      memory_enabled: true
      backend: hindsight
      hindsight:
        mode: local_external
        api_url: http://hindsight.hindsight.svc.cluster.local:8888
        bank_id: hermes-t

    # Read-only observability MCPs from flux/apps/observability/mcp-tools/.
    # /mcp is the streamable-http path (cluster's MCP transport standard —
    # verified live against the running mcp-prometheus/mcp-loki/mcp-kubernetes
    # pods; see their deployment manifests for tool lists and RBAC scoping).
    # hermes-k never gets this block — kid-mode denies these tools by policy.
    mcp_servers:
      mcp-prometheus:
        url: http://mcp-prometheus.mcp-tools.svc.cluster.local:8080/mcp
        enabled: true
      mcp-loki:
        url: http://mcp-loki.mcp-tools.svc.cluster.local:8080/mcp
        enabled: true
      mcp-kubernetes:
        url: http://mcp-kubernetes.mcp-tools.svc.cluster.local:8080/mcp
        enabled: true

      # mcpjungle: higher-trust MCP gateway (flux/apps/mcp-gateway/) fronting
      # Firewalla, Omada, arr, Home Assistant, Jellyfin, NetBox (read-write).
      # Auth is a per-client bearer token (MCPJungle's own enterprise-mode
      # access control, scoped via `mcpjungle create mcp-client hermes-t
      # --allow "firewalla,omada,arr,homeassistant,jellyfin,netbox"`), not
      # Kanidm/oauth2-proxy — verified live against the running hermes-t pod
      # (`hermes mcp add --auth header`, schema confirmed via mcp_tool.py:
      # `headers: {Authorization: "Bearer ${VAR}"}`, `${VAR}` resolved from
      # the MCP_MCPJUNGLE_API_KEY env var, itself sourced from
      # sealedsecret-hermes-t-config.yaml like DEEPSEEK_API_KEY/etc above).
      mcpjungle:
        url: http://mcpjungle.mcp-gateway.svc.cluster.local:8080/mcp
        enabled: true
        auth: header
        headers:
          Authorization: "Bearer ${MCP_MCPJUNGLE_API_KEY}"
