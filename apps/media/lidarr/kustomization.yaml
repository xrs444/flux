# Lidarr - Music collection manager
# Beets CronJob auto-tags /ingest → /music every 15 minutes
# Handles library metadata, quality rules, and Jellyfin sync
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lidarr
resources:
  - namespace.yaml
  - sealedsecret-lidarr-apikey.yaml
  - deployment-lidarr.yaml
  - service-lidarr.yaml
  # Metrics ClusterIP service + ServiceMonitor for Exportarr sidecar (port 9709)
  - service-lidarr-metrics.yaml
  - servicemonitor-lidarr.yaml
  - ingressroute-lidarr.yaml
  - configmap-beets.yaml
  - cronjob-beets.yaml
  # Storage resources
  - pv-lidarr-music.yaml
  - pv-lidarr-ingest.yaml
  - pvc-lidarr-config.yaml
  - pvc-lidarr-music.yaml
  - pvc-lidarr-ingest.yaml
  - pvc-beets-state.yaml
