---
# Immich server exposes Prometheus metrics on port 8081
apiVersion: v1
kind: Service
metadata:
  name: immich-metrics
  namespace: immich
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app.kubernetes.io/name: server
    app.kubernetes.io/instance: immich
