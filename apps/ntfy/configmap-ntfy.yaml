---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    # Base configuration
    base-url: https://ntfy.xrs444.net
    cache-file: /var/cache/ntfy/cache.db
    auth-file: /var/lib/ntfy/user.db
    auth-default-access: deny-all
    behind-proxy: true

    # Access Control List
    # ACL is managed via init container using 'ntfy access' commands
    # Default access: deny-all (configured above)
    # This ensures users can only access their designated topics
