---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    # Base configuration
    base-url: https://ntfy.xrs444.net
    cache-file: /var/cache/ntfy/cache.db
    auth-file: /var/lib/ntfy/user.db
    auth-default-access: deny-all
    behind-proxy: true

    # Access Control List - Per-User Topics Architecture
    # Format: topic permissions username
    # Default access: deny-all
    # Apprise routes notifications to user topics based on tags
    acl:
      # Apprise - central router with write access to all user topics
      - topic: "*"
        permission: "write-only"
        username: "apprise"

      # User Topics - each user has read-only access to their topic
      - topic: "dog"
        permission: "read-only"
        username: "dog"
      - topic: "xrs444"
        permission: "read-only"
        username: "xrs444"
      - topic: "samantha"
        permission: "read-only"
        username: "samantha"
      - topic: "greyson"
        permission: "read-only"
        username: "greyson"
      - topic: "rowan"
        permission: "read-only"
        username: "rowan"

      # Admin (dog) has full access to all topics
      - topic: "*"
        permission: "read-write"
        username: "dog"
