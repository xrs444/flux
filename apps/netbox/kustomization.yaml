---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: netbox
resources:
  # Namespace
  - namespace-netbox.yaml

  # Secrets — NetBox
  - sealedsecret-netbox.yaml
  - sealedsecret-superuser.yaml
  - oauth2-sealedsecret-netbox.yaml
  - sealedsecret-oidc-config.yaml
  - sealedsecret-api-token-peppers.yaml

  # Helm Repositories
  - helmrepository-netbox.yaml

  # Helm Releases
  - helmrelease-netbox.yaml

  # ServiceMonitor enabled via Helm values (metrics.serviceMonitor.enabled)
  # Ingress
  - ingressroute-netbox.yaml
