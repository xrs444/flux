---
# Beets import CronJob — auto-tags music from /ingest, moves to /music.
# Runs every 15 min. Forbid concurrency prevents overlapping imports.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: beets-import
  namespace: lidarr
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: beets
              image: lscr.io/linuxserver/beets:latest
              command: ["/usr/bin/beet"]
              args:
                - -c
                - /config/config.yaml
                - import
                - -q
                - /ingest
              volumeMounts:
                - name: ingest
                  mountPath: /ingest
                - name: music
                  mountPath: /music
                - name: beets-config
                  mountPath: /config
                  readOnly: true
                - name: beets-state
                  mountPath: /beets-state
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
          volumes:
            - name: ingest
              persistentVolumeClaim:
                claimName: lidarr-ingest
            - name: music
              persistentVolumeClaim:
                claimName: lidarr-music
            - name: beets-config
              configMap:
                name: beets-config
                items:
                  - key: config.yaml
                    path: config.yaml
            - name: beets-state
              persistentVolumeClaim:
                claimName: beets-state
