---
# Exportarr sidecar exposes Lidarr metrics on port 9709
apiVersion: v1
kind: Service
metadata:
  name: lidarr-metrics
  namespace: lidarr
  labels:
    app: lidarr
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9709
      targetPort: 9709
      protocol: TCP
  selector:
    app: lidarr
