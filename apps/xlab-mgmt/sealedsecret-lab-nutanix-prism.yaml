---
# yamllint disable rule:line-length
# Nutanix Prism Central API credentials — used by future Windmill lab power scripts.
# Prism Central endpoint: https://xntnx-pc.lab.xrs444.net:9440
#
# To seal:
#   kubectl create secret generic lab-nutanix-prism \
#     --namespace=xlab-mgmt \
#     --from-literal=username='<prism-api-user>' \
#     --from-literal=password='<prism-api-password>' \
#     --from-literal=url='https://xntnx-pc.lab.xrs444.net:9440' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace sealed-secrets --controller-name sealed-secrets \
#   > sealedsecret-lab-nutanix-prism.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lab-nutanix-prism
  namespace: xlab-mgmt
spec:
  encryptedData:
    username: REPLACE_WITH_KUBESEAL_OUTPUT
    password: REPLACE_WITH_KUBESEAL_OUTPUT
    url: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: lab-nutanix-prism
      namespace: xlab-mgmt
