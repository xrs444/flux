---
# yamllint disable rule:line-length
# IPMI/BMC credentials for Nutanix cluster nodes — used by future Windmill lab power scripts.
# Hosts: xntnx1 (172.25.1.10), xntnx2 (172.25.1.20), xntnx3 (172.25.1.30)
#
# To seal (one secret covers all nodes if they share credentials; split if they differ):
#   kubectl create secret generic lab-ipmi \
#     --namespace=xlab-mgmt \
#     --from-literal=username='<ipmi-user>' \
#     --from-literal=password='<ipmi-password>' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace sealed-secrets --controller-name sealed-secrets \
#   > sealedsecret-lab-ipmi.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lab-ipmi
  namespace: xlab-mgmt
spec:
  encryptedData:
    username: REPLACE_WITH_KUBESEAL_OUTPUT
    password: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: lab-ipmi
      namespace: xlab-mgmt
