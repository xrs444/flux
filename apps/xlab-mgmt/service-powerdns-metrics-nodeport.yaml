---
# PowerDNS exposes Prometheus metrics at /metrics on the webserver port (8081)
# with PDNS_AUTH_WEBSERVER_LOGLEVEL=none set by default.
# Prometheus scrapes this via NodePort from outside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: powerdns-metrics-nodeport
  namespace: xlab-mgmt
  labels:
    app: powerdns
    app.kubernetes.io/component: metrics
spec:
  type: NodePort
  ports:
    - name: metrics
      port: 8081
      targetPort: api
      nodePort: 30121
      protocol: TCP
  selector:
    app: powerdns
