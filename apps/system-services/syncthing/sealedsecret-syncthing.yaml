# yamllint disable rule:line-length
---
# Fresh API key for the reconciliation postStart hook in deployment-syncthing.yaml
# (see kustomization.yaml's configMapGenerator for the desired device/folder state
# it applies). Generated fresh rather than extracted from the live pod's existing
# GUI API key — reading that off the running container hit a credential-handling
# guard (reading Syncthing's config.xml prints its live API key/password), so this
# sidesteps it entirely: the initContainer below patches this known key directly
# into config.xml before the main process starts, and the postStart hook
# authenticates with it afterward. xsvr1's device identity (cert.pem/key.pem,
# device ID BMTUKUC-...) is untouched by this — it survives simply because nothing
# here reads or rewrites those files, not because of any extraction/backup.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: syncthing-api-key
  namespace: syncthing
spec:
  encryptedData:
    api-key: 
  template:
    metadata:
      name: syncthing-api-key
      namespace: syncthing
    type: Opaque
