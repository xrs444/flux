# Syncthing - Continuous file synchronization
# Syncs files between devices using the Syncthing protocol
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - deployment-syncthing.yaml
  - service-syncthing.yaml
  - service-syncthing-sync.yaml
  - ingressroute-syncthing.yaml
  # NFS storage
  - pv-syncthing-data.yaml
  - pvc-syncthing-data.yaml
  # Declarative device/folder reconciliation (see deployment-syncthing.yaml's
  # initContainer + postStart hook)
  - sealedsecret-syncthing.yaml

# Content-hash suffix so editing config/*.json actually rolls the Deployment
# (a plain ConfigMap edit alone does not restart anything) — precedent:
# flux/apps/observability/monitoring/kustomization.yaml.
configMapGenerator:
  - name: syncthing-desired-state
    namespace: syncthing
    files:
      - config/devices.json
      - config/folder.json
