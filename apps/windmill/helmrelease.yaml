# yamllint disable rule:line-length
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
  namespace: windmill
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: windmill
      version: ">=4.0.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: windmill
        namespace: windmill
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Disable the demo postgresql container — we deploy our own StatefulSet
    postgresql:
      enabled: false

    # Disable built-in ingress — we use a Traefik IngressRoute
    ingress:
      enabled: false

    windmill:
      baseDomain: windmill.xrs444.net
      baseProtocol: https
      appReplicas: 1
      # windmill-extra: unified LSP + debugger pod (1 replica = responsive IDE)
      extraReplicas: 1
      # Disable the indexer — ephemeral-storage hungry, not needed for homelab
      indexer:
        enabled: false

      # Database URL comes from the windmill-postgres-url SealedSecret
      databaseUrlSecretName: windmill-postgres-url
      databaseUrlSecretKey: url

      app:
        extraEnv:
          - name: OAUTH_JSON_AS_BASE64
            valueFrom:
              secretKeyRef:
                name: windmill-oauth
                key: oauth-json-base64

      workerGroups:
        # default: privileged, SSH-enabled, kubectl SA for in-cluster jobs
        - name: default
          replicas: 1
          privileged: true
          serviceAccountName: windmill-runner
          volumes:
            - name: ssh-key
              secret:
                secretName: windmill-ssh-key
                defaultMode: 0600
            - name: known-hosts
              configMap:
                name: windmill-known-hosts
          volumeMounts:
            - name: ssh-key
              mountPath: /root/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: known-hosts
              mountPath: /root/.ssh/known_hosts
              subPath: known_hosts
              readOnly: true

        # native: lightweight, for fast TS/Py jobs without container overhead
        - name: native
          replicas: 1
          privileged: false
