---
# Windmill CE exposes Prometheus metrics at /metrics on the main app port (8000)
apiVersion: v1
kind: Service
metadata:
  name: windmill-metrics
  namespace: windmill
  labels:
    app: windmill
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: windmill
    app.kubernetes.io/component: app
