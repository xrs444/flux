---
apiVersion: v1
kind: Service
metadata:
  name: garage-metrics-nodeport
  namespace: garage
  labels:
    app: garage
    app.kubernetes.io/component: metrics
spec:
  type: NodePort
  ports:
    - name: metrics
      port: 3903
      targetPort: 3903
      nodePort: 30100
      protocol: TCP
  selector:
    app: garage
