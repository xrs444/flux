---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-t-config
  namespace: hermes-t
data:
  config.yaml: |
    model:
      default: deepseek-v4-flash
      provider: deepseek

    terminal:
      backend: local

    memory:
      memory_enabled: true
      backend: hindsight
      hindsight:
        mode: local_external
        api_url: http://hindsight.hindsight.svc.cluster.local:8888
        bank_id: hermes-t
