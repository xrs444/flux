---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-t
  namespace: hermes-t
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes-t.xrs444.net`)
      kind: Rule
      services:
        - name: hermes-t
          port: 8642
  tls:
    secretName: letsencrypt-wildcard-cert-xrs444.net
