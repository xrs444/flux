---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-s
  namespace: hermes-s
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes-s.xrs444.net`)
      kind: Rule
      services:
        - name: hermes-s
          port: 8642
  tls:
    secretName: letsencrypt-wildcard-cert-xrs444.net
