---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: manyfold-ingest-nfs
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 172.20.3.201
    path: /zfs/ingest/3dmodels
  mountOptions:
    - vers=4.1
    - hard
    - intr
