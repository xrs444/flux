---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-tvshows-nfs
spec:
  capacity:
    storage: 100Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 172.20.3.201
    path: /export/zfs/media/tvshows
  mountOptions:
    - vers=4.1
    - hard
    - intr
