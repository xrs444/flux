---
# Exportarr sidecar exposes Sonarr metrics on port 9707
apiVersion: v1
kind: Service
metadata:
  name: sonarr-metrics
  namespace: sonarr
  labels:
    app: sonarr
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9707
      targetPort: 9707
      protocol: TCP
  selector:
    app: sonarr
