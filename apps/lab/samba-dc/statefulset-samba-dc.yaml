---
# Samba Active Directory Domain Controller
# Domain: AD.LAB.XRS444.NET  |  NetBIOS: LAB  |  DC hostname: dc1
# Image: nowsci/samba-domain — handles first-run `samba-tool domain provision`
#   automatically when /var/lib/samba/private/sam.ldb does not exist.
# Data persisted in Longhorn PVC; the provision script is mounted read-only
# from ConfigMap and executed by the CronJob (see cronjob-samba-provision.yaml).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: samba-dc
  namespace: samba-dc
  labels:
    app: samba-dc
spec:
  serviceName: samba-dc-headless
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: samba-dc
  template:
    metadata:
      labels:
        app: samba-dc
    spec:
      # DC hostname must be stable and short; used in Kerberos keytabs + DNS SRV records
      hostname: dc1
      subdomain: samba-dc-headless
      containers:
        - name: samba-dc
          # Pin to a specific tag before production use; :latest used here for initial deploy
          image: nowsci/samba-domain:20260701025204
          envFrom:
            - configMapRef:
                name: samba-dc-config
          env:
            - name: DOMAINPASS
              valueFrom:
                secretKeyRef:
                  name: samba-dc-secrets
                  key: admin-password
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: krb-tcp
              containerPort: 88
              protocol: TCP
            - name: krb-udp
              containerPort: 88
              protocol: UDP
            - name: rpc
              containerPort: 135
              protocol: TCP
            - name: ldap
              containerPort: 389
              protocol: TCP
            - name: ldap-udp
              containerPort: 389
              protocol: UDP
            - name: smb
              containerPort: 445
              protocol: TCP
            - name: kpasswd-tcp
              containerPort: 464
              protocol: TCP
            - name: kpasswd-udp
              containerPort: 464
              protocol: UDP
            - name: ldaps
              containerPort: 636
              protocol: TCP
            - name: gc
              containerPort: 3268
              protocol: TCP
            - name: gcs
              containerPort: 3269
              protocol: TCP
          volumeMounts:
            - name: samba-data
              mountPath: /var/lib/samba
            - name: provision-scripts
              mountPath: /provision
            # Users/groups mounted separately — can't subPath into an existing mountpoint
            - name: provision-users
              mountPath: /provision-users
          # After Samba starts, patch smb.conf so samba_dnsupdate only registers
          # the LB IP (HOSTIP) instead of the pod's eth0 IP, which is not routable
          # externally. Then delete any stale pod-IP DNS records.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    # Wait for Samba to write smb.conf and start
                    until [ -f /etc/samba/smb.conf ]; do sleep 2; done
                    sleep 5
                    # Inject settings that samba's startup script resets on each restart
                    if ! grep -q "^[[:space:]]*interfaces" /etc/samba/smb.conf; then
                      sed -i "/^\[global\]/a\\\tinterfaces = lo ${HOSTIP}\n\tbind interfaces only = no" /etc/samba/smb.conf
                    fi
                    # Allow simple LDAP binds — Samba AD blocks plain-text auth by default
                    # even over TLS; this is required for OpenRSAT and Nutanix LDAP bind
                    if ! grep -q "ldap server require strong auth" /etc/samba/smb.conf; then
                      sed -i "/^\[global\]/a\\\tldap server require strong auth = no" /etc/samba/smb.conf
                    fi
                    # Wait for LDAP to be up, then purge pod-IP DNS records
                    POD_IP=$(hostname -I | awk '{print $1}')
                    until samba-tool domain info 127.0.0.1 >/dev/null 2>&1; do sleep 5; done
                    sleep 5
                    samba-tool dns delete 127.0.0.1 "$REALM" @ A "$POD_IP" 2>/dev/null || true
                    samba-tool dns delete 127.0.0.1 "$REALM" "$(hostname -s)" A "$POD_IP" 2>/dev/null || true
          # Allow enough time for first-run domain provisioning (~60s typical)
          startupProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            privileged: true
      volumes:
        - name: samba-data
          persistentVolumeClaim:
            claimName: samba-dc-data
        - name: provision-scripts
          configMap:
            name: samba-provision-scripts
            defaultMode: 0755
        - name: provision-users
          configMap:
            name: samba-users
