---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: immich
  namespace: immich
  labels:
    app.kubernetes.io/name: immich
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: immich
      app.kubernetes.io/component: metrics
  namespaceSelector:
    matchNames:
      - immich
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
