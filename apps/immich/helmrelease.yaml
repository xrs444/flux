---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: "0.12.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  values:
    # Global env vars — inherited by both server and machine-learning components
    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME: immich-postgres
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich
              DB_PORT: "5432"
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db
                    key: password
              REDIS_HOSTNAME: immich-redis
              REDIS_PORT: "6379"
              IMMICH_TELEMETRY_INCLUDE: "all"

    immich:
      configurationKind: Secret
      existingConfiguration: immich-config
      persistence:
        library:
          existingClaim: immich-photos

    server:
      enabled: true

    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: emptyDir

    # Bundled valkey disabled — we run external Redis
    valkey:
      enabled: false
