---
# yamllint disable rule:line-length
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seatable
  namespace: seatable
  labels:
    app: seatable
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seatable
  template:
    metadata:
      labels:
        app: seatable
    spec:
      initContainers:
        - name: oauth-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              # Wait for seatable directory to be created or create it
              mkdir -p /shared/seatable/conf

              # Read the OAuth template and inject the client secret
              cat /oauth-template/oauth-settings.py > /tmp/oauth-config.py
              echo "OAUTH_CLIENT_SECRET = '${OAUTH_CLIENT_SECRET}'" >> /tmp/oauth-config.py

              # Append OAuth config to dtable_web_settings.py
              if [ -f /shared/seatable/conf/dtable_web_settings.py ]; then
                # Check if OAuth config already exists
                if ! grep -q "ENABLE_OAUTH" /shared/seatable/conf/dtable_web_settings.py; then
                  echo "" >> /shared/seatable/conf/dtable_web_settings.py
                  echo "# OAuth Configuration" >> /shared/seatable/conf/dtable_web_settings.py
                  cat /tmp/oauth-config.py >> /shared/seatable/conf/dtable_web_settings.py
                fi
              else
                # Create new file with OAuth config
                echo "# OAuth Configuration" > /shared/seatable/conf/dtable_web_settings.py
                cat /tmp/oauth-config.py >> /shared/seatable/conf/dtable_web_settings.py
              fi
          env:
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-secret-seatable
                  key: client-secret
          volumeMounts:
            - name: seatable-data
              mountPath: /shared
            - name: oauth-config
              mountPath: /oauth-template
      containers:
        - name: seatable
          image: seatable/seatable-enterprise:latest
          ports:
            - containerPort: 80
              name: http
          env:
            - name: SEATABLE_SERVER_HOSTNAME
              value: "seatable.xrs444.net"
            - name: SEATABLE_SERVER_PROTOCOL
              value: "https"
            - name: TIME_ZONE
              value: "America/Phoenix"
            - name: SEATABLE_MYSQL_DB_HOST
              value: "127.0.0.1"
            - name: SEATABLE_MYSQL_DB_PORT
              value: "3306"
            - name: SEATABLE_MYSQL_DB_USER
              value: "root"
            - name: SEATABLE_MYSQL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: mariadb-root-password
            - name: INIT_SEATABLE_MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: mariadb-root-password
            - name: SEATABLE_MYSQL_DB_DTABLE_DB_NAME
              value: "dtable_db"
            - name: SEATABLE_MYSQL_DB_CCNET_DB_NAME
              value: "ccnet_db"
            - name: SEATABLE_MYSQL_DB_SEAFILE_DB_NAME
              value: "seafile_db"
            - name: REDIS_HOST
              value: "127.0.0.1"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: ""
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: jwt-private-key
            - name: SEATABLE_ADMIN_EMAIL
              value: "xrs444@xrs444.net"
            - name: SEATABLE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: admin-password
          volumeMounts:
            - name: seatable-data
              mountPath: /shared
            - name: seatable-license
              mountPath: /shared/seatable/seatable-license.txt
              subPath: seatable-license.txt
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: mariadb-root-password
            - name: MYSQL_LOG_CONSOLE
              value: "true"
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --max-connections=1000
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: seatable-data
          persistentVolumeClaim:
            claimName: seatable-data
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: seatable-mariadb-data
        - name: seatable-license
          secret:
            secretName: seatable-license
        - name: oauth-config
          configMap:
            name: seatable-oauth-config
