---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`alertmanager.xrs444.net`)
      kind: Rule
      middlewares:
        - name: dashboard-auth
          namespace: traefik
        - name: dashboard-errors
          namespace: traefik
      services:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
  tls:
    secretName: letsencrypt-wildcard-cert-xrs444.net
