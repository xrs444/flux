# yamllint disable rule:line-length
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '86.3.2'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    # Disable bundled exporters — these are already deployed separately or not needed
    nodeExporter:
      enabled: false
    kubeStateMetrics:
      enabled: false

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        retention: 30d
        retentionSize: 45GiB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-retain
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 50Gi
        # Additional scrape configs from Secret (bare-metal hosts, SNMP, k8s NodePorts, HA, etc.)
        additionalScrapeConfigsSecret:
          enabled: true
          name: prometheus-additional-scrape-configs
          key: scrape-configs.yaml
        # Secrets mounted at /etc/prometheus/secrets/<name>/ for credentials_file use
        secrets:
          - ha-bearer-token
          - netbox-api-token
        # Allow ServiceMonitors/PodMonitors/PrometheusRules from any namespace
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
      ingress:
        enabled: false

    # Grafana configuration
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: longhorn-retain
        size: 5Gi
      # Longhorn PVC is ReadWriteOnce and single-replica, so a RollingUpdate deadlocks:
      # the new pod can't mount the volume until the old pod releases it, but the old
      # pod won't terminate until the new one is Ready. Recreate avoids the deadlock.
      deploymentStrategy:
        type: Recreate
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      envFromSecret: grafana-oauth-secret
      grafana.ini:
        auth:
          disable_login_form: false
          oauth_auto_login: false
        auth.generic_oauth:
          enabled: true
          name: Kanidm
          client_id: oauth2_grafana
          client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email groups
          auth_url: https://idm.xrs444.net/oauth2/authorise
          token_url: https://idm.xrs444.net/oauth2/token
          api_url: https://idm.xrs444.net/oauth2/openid/oauth2_grafana/userinfo
          use_pkce: true
          role_attribute_path: "contains(groups[*], 'grafana-admin') && 'Admin' || contains(groups[*], 'grafana') && 'Viewer' || 'Viewer'"
          allow_sign_up: true
      # The chart's sidecar already provisions a default Prometheus datasource.
      # Only add Loki here to avoid a duplicate-default conflict.
      additionalDataSources:
        - name: Loki
          type: loki
          url: https://loki.xrs444.net
          uid: "000000002"
          jsonData:
            maxLines: 1000
            timeout: 60
      # Sidecar loads ConfigMaps labelled grafana_dashboard=1 from all namespaces
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          folderAnnotation: grafana_folder
          provider:
            disableDelete: false
            allowUiUpdates: true
      ingress:
        enabled: false

    # Alertmanager configuration
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-retain
              resources:
                requests:
                  storage: 2Gi
      # Alertmanager config is stored in sealedsecret-alertmanager-config.yaml.
      # Full config (routing, receivers, Windmill webhook token) lives there.
      # See secret-alertmanager-config.secret.yaml (gitignored) for the plaintext template.
      configSecret: alertmanager-config
      ingress:
        enabled: false

    # Windmill-specific alert rules
    additionalPrometheusRulesMap:
      windmill-rules:
        groups:
          - name: windmill
            rules:
              - alert: WindmillWorkerDown
                expr: up{job="windmill"} == 0
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "Windmill unreachable"
                  description: "Prometheus cannot scrape windmill metrics endpoint for 5 minutes."
