# SealedSecret for mcp-loki (which uses grafana/mcp-grafana under the hood).
#
# Populate before deploying:
#   1. In Grafana UI (grafana.xrs444.net) → Administration → Service Accounts
#      → New service account → Name: mcp-loki (role: Viewer), then create an
#      access token. Copy the "glsa_..." token.
#   2. Seal:
#        kubectl create secret generic mcp-grafana-credentials \
#          --namespace mcp-tools \
#          --from-literal=api-key="<glsa_token>" \
#          --dry-run=client -o yaml | \
#        kubeseal --controller-name=sealed-secrets \
#                 --controller-namespace=sealed-secrets \
#                 --format=yaml \
#                 > sealedsecret-mcp-grafana-credentials.yaml
#
# The service account only needs Viewer role — mcp-grafana with
# --enabled-tools=loki only calls read APIs on the Loki datasource.
# yamllint disable rule:line-length
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mcp-grafana-credentials
  namespace: mcp-tools
spec:
  encryptedData:
    api-key: PLACEHOLDER_GRAFANA_SA_TOKEN_REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: mcp-grafana-credentials
      namespace: mcp-tools
    type: Opaque
