summary: Synthetic SSO Login Monitor
description: Verifies that the `monitoring` Kanidm account can perform an OAuth2
  PKCE authorize round-trip against each app's Kanidm client every 10 minutes.
  Authenticates with password + TOTP (automated, no human interaction). Pushes
  synthetic_login_success{app} and synthetic_login_duration_seconds{app} to
  Prometheus Pushgateway (job=synthetic_login). Requires
  u/admin/monitoring_kanidm_password and u/admin/monitoring_kanidm_totp
  variables.
lock: '!inline f/monitoring/synthetic_login.script.lock'
has_on_behalf_of: false
kind: script
schema: null
