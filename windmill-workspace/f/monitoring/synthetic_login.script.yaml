summary: Synthetic SSO Login Monitor
description: Verifies that the `monitoring` Kanidm account can perform an OAuth2
  PKCE authorize round-trip against each app's Kanidm client every 10 minutes.
  Pushes synthetic_login_success{app} and synthetic_login_duration_seconds{app}
  to Prometheus Pushgateway (job=synthetic_login). PrometheusRule alerts fire
  via Alertmanager → Apprise → ntfy. Requires variable
  u/admin/monitoring_kanidm_password to be set after the `monitoring` Kanidm
  person is provisioned.
lock: '!inline f/monitoring/synthetic_login.script.lock'
has_on_behalf_of: false
kind: script
schema: null
