description: |
  Powers off the Nutanix lab in the correct sequence:
  1. Lists and gracefully shuts down all user VMs via Prism Central v4 API
  2. Shuts down Prism Central VM via CVM acli
  3. Stops the Nutanix cluster via CVM SSH
  4. Powers off all three nodes via HP iLO 5 Redfish
  5. Waits for nodes to be fully off
  6. Turns off HA smart plug (switch.lab_power) via webhook

  Requires AOS 6.5+ for Nutanix v4 API support.
  CVM SSH uses the Windmill worker SSH key (/root/.ssh/id_ed25519).
is_template: false
kind: script
lock: ""
path: f/lab/lab_power_off
schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  type: object
  properties:
    ha_webhook:
      type: object
      format: resource-lab_ha_webhook
      description: "HA webhook URLs for smart plug control"
      default: "u/admin/lab_ha_webhook"
    ilo1:
      type: object
      format: resource-lab_ipmi
      description: "iLO credentials for xntnx1 (172.25.4.1)"
      default: "u/admin/lab_ipmi_xntnx1"
    ilo2:
      type: object
      format: resource-lab_ipmi
      description: "iLO credentials for xntnx2 (172.25.4.2)"
      default: "u/admin/lab_ipmi_xntnx2"
    ilo3:
      type: object
      format: resource-lab_ipmi
      description: "iLO credentials for xntnx3 (172.25.4.3)"
      default: "u/admin/lab_ipmi_xntnx3"
    cvm:
      type: object
      format: resource-lab_cvm_ssh
      description: "Primary CVM for cluster SSH operations"
      default: "u/admin/lab_cvm_primary"
    prism:
      type: object
      format: resource-lab_nutanix_prism
      description: "Prism Central API credentials (URL must include port: https://172.25.2.100:9440)"
      default: "u/admin/lab_nutanix_prism"
  required:
    - ha_webhook
    - ilo1
    - ilo2
    - ilo3
    - cvm
    - prism
summary: "Lab Power Off"
tag: ""
language: ansible
