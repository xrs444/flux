summary: Alertmanager webhook entry point — raw ntfy immediately, then
  deterministic routing to runbooks
description: >-
  Phase A alert pipeline entry point.


  Invariants (from plan §6.2):

  1. Human gets raw ntfy notification BEFORE any LLM enrichment — step 1 is
  unconditional.

  2. Deterministic label matching wins over LLM routing.

  3. No autonomous execution — runbooks require ntfy approval tap. EXCEPTION:
  read-only, always-safe-to-auto-run checks (restic-check-repo) are invoked
  directly, matching plan §6.5's own carve-out for borg-check-repo.

  4. LLM enrichment (f/sre/hermes-enrich) is stubbed; wires in Phase C.


  ntfy topics: alerts-critical (severity=critical), alerts-warning (default
  firing), alerts-resolved.

  ntfy token: stored in Windmill variable f/sre/ntfy_token (set manually after
  deploy).


  Backup branch (2026-07-10): now actually invokes
  f/sre/runbooks/backup/restic-check-repo and posts the result to ntfy — Borg
  has zero client repos configured anywhere so borg-check-repo was dropped in
  favor of the real restic→Synology path. BLOCKED until the xsvr2 nix changes
  (automation sudoers rule) deploy.


  Arr-queue branch is still a stub — f/sre/runbooks/restart-arr-queue exists and
  is real, but auto-invoking it means mutating arr state with no ntfy
  Approve-button loop yet (Phase C), so it stays log-only until that gate
  exists.
value:
  modules:
    - id: post_ntfy
      summary: Post raw ntfy notification immediately — unconditional
      value:
        type: rawscript
        content: '!inline post_raw_ntfy_notification_immediately_—_unconditional.ts'
        input_transforms:
          ntfy_base_url:
            type: static
            value: https://ntfy.xrs444.net
          ntfy_token:
            type: static
            value: $var:f/sre/ntfy_token
          payload:
            type: javascript
            expr: flow_input
        lock: '!inline post_raw_ntfy_notification_immediately_—_unconditional.lock'
        language: bun
    - id: route_alert
      summary: Deterministic routing — known patterns → runbook stubs; unknown → Phase
        C placeholder
      value:
        type: branchone
        branches:
          - summary: Resolved — acknowledge, no runbook
            modules:
              - id: resolved_ack
                value:
                  type: rawscript
                  content: '!inline resolved_ack.ts'
                  input_transforms: {}
                  lock: '!inline resolved_ack.lock'
                  language: bun
            expr: flow_input.status === 'resolved'
            parallel: true
            skip_failure: true
          - summary: Arr queue stuck → restart-arr-queue runbook exists, not yet
              auto-invoked (Phase C)
            modules:
              - id: runbook_arr_stub
                value:
                  type: rawscript
                  content: '!inline runbook_arr_stub.ts'
                  input_transforms:
                    payload:
                      type: javascript
                      expr: flow_input
                  lock: '!inline runbook_arr_stub.lock'
                  language: bun
            expr: "['SonarrQueueStuck','RadarrQueueStuck','LidarrQueueStuck','ArrQueueStuck\
              '].some(n => (flow_input.commonLabels?.alertname ??
              '').includes(n) || (flow_input.alerts?.[0]?.labels?.alertname ??
              '').includes(n))"
            parallel: true
            skip_failure: true
          - summary: Backup failure → run restic-check-repo (read-only, always safe) and
              report result
            modules:
              - id: runbook_restic_check
                summary: Run read-only restic-check-repo — always safe to auto-run
                value:
                  type: script
                  input_transforms: {}
                  path: f/sre/runbooks/backup/restic-check-repo
              - id: post_restic_check_result
                summary: Post restic-check-repo result to ntfy thread
                value:
                  type: rawscript
                  content: '!inline post_restic-check-repo_result_to_ntfy_thread.ts'
                  input_transforms:
                    check_result:
                      type: javascript
                      expr: results.runbook_restic_check
                    ntfy_base_url:
                      type: static
                      value: https://ntfy.xrs444.net
                    ntfy_token:
                      type: static
                      value: $var:f/sre/ntfy_token
                  lock: '!inline post_restic-check-repo_result_to_ntfy_thread.lock'
                  language: bun
            expr: "['BackupFailed','BackupMissed','BackupStaleTooLong','ResticFailed','Offl\
              ineBackupFailed'].some(n => (flow_input.commonLabels?.alertname ??
              '').includes(n) || (flow_input.alerts?.[0]?.labels?.alertname ??
              '').includes(n))"
            parallel: true
            skip_failure: true
        default:
          - id: no_runbook_match
            value:
              type: rawscript
              content: '!inline no_runbook_match.ts'
              input_transforms:
                payload:
                  type: javascript
                  expr: flow_input
              lock: '!inline no_runbook_match.lock'
              language: bun
has_on_behalf_of: false
schema: null
